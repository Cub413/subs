<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>CI Studios Sub Goal</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Press Start 2P', cursive;
    }
    
    #container {
      text-align: center;
      width: 80%;
    }
    
    #label {
      font-size: 18px;
      color: white;
      margin-bottom: 14px;
      text-shadow:
        2px 2px 0 black,
        -2px 2px 0 black,
        2px -2px 0 black,
        -2px -2px 0 black;
    }
    
    #bar-container {
      width: 100%;
      height: 42px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      overflow: hidden;
      border: 5px solid black;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.6);
    }
    
    #bar {
      width: 0%;
      height: 100%;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      transition: width 1s ease;
      background: linear-gradient(to right, red, yellow, orange);
      
      text-shadow:
        2px 2px 0 black,
        -2px 2px 0 black,
        2px -2px 0 black,
        -2px -2px 0 black;
    }
  </style>
</head>

<body>
  
  <div id="container">
    
    <div id="label">C.I STUDIOS • META 10,000 SUBS</div>
    
    <div id="bar-container">
      <div id="bar">0 / 10,000</div>
    </div>
    
  </div>
  
  <script>
    const bar = document.getElementById("bar");
    const channel = "UC8ZeH9sYYbrnhlBZZ56c3Pg";
    const goal = 10000;
    
    async function update() {
      
      try {
        
        const res = await fetch("https://mixerno.space/api/youtube-channel-counter/user/" + channel);
        const data = await res.json();
        
        let subs = data.counts[0].count;
        let progress = Math.min(subs / goal, 1);
        
        bar.style.width = (progress * 100) + "%";
        
        bar.textContent = `${Number(subs).toLocaleString()} / ${goal.toLocaleString()}`;
        
        bar.style.background =
          `linear-gradient(to right, red, yellow, orange ${progress*100}%, rgba(0,0,0,0) ${progress*100}%)`;
        
      } catch (e) {
        
        bar.textContent = "Error";
        bar.style.background = "gray";
        
      }
      
    }
    
    update();
    setInterval(update, 5000);
  </script>
  
</body>

</html>
