<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
margin:0;
background:transparent;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial, Helvetica, sans-serif;
}

#container{
position:relative;
width:220px;
height:220px;
}

#circle{
width:100%;
height:100%;
border-radius:50%;
border:8px solid black;
overflow:hidden;
position:relative;
background:#222;
}

#wave{
position:absolute;
bottom:0;
width:100%;
height:0%;
background:linear-gradient(to top,#00aaff,#00e0ff);
transition:height 1s;
overflow:hidden;
}

#wave::before{
content:"";
position:absolute;
top:-25px;
left:-50%;
width:300%;
height:50px;
background:rgba(255,255,255,0.4);
border-radius:40%;
animation:waveMove 4s linear infinite;
}

@keyframes waveMove{
0%{transform:translateX(0);}
100%{transform:translateX(-33.33%);}
}

#text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:25px;
text-align:center;

/* borde negro */
text-shadow:
-2px -2px 0 #000,
2px -2px 0 #000,
-2px 2px 0 #000,
2px 2px 0 #000,
0px 2px 0 #000,
2px 0px 0 #000,
0px -2px 0 #000,
-2px 0px 0 #000;
}
</style>
</head>

<body>

<div id="container">

<div id="circle">
<div id="wave"></div>
</div>

<div id="text">0 / 10,000 SUBS</div>

</div>

<script>

const channel="UC8ZeH9sYYbrnhlBZZ56c3Pg";
const goal=10000;

const wave=document.getElementById("wave");
const text=document.getElementById("text");

async function update(){

try{

const res=await fetch("https://mixerno.space/api/youtube-channel-counter/user/"+channel);
const data=await res.json();

let subs=data.counts[0].count;

let progress=Math.min(subs/goal,1);

wave.style.height=(progress*100)+"%";

text.textContent=`${Number(subs).toLocaleString()} / ${goal.toLocaleString()} SUBS`;

}catch(e){

text.textContent="Error";

}

}

update();
setInterval(update,5000);

</script>

</body>
</html>
